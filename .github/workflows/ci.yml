# ╔══════════════════════════════════════════════════════════════╗
# ║  CI/CD — Build, Lint e Testes                                  ║
# ╠══════════════════════════════════════════════════════════════╣
# ║  Executa em: push e PR para main/develop                       ║
# ║  Jobs: lint, test-frontend, test-rust, qa-real, build-tauri     ║
# ╚══════════════════════════════════════════════════════════════╝

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_autoos

jobs:
  # ═══════════════════════════════════════════════════════════
  # Lint — TypeScript check
  # ═══════════════════════════════════════════════════════════
  lint:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

  # ═══════════════════════════════════════════════════════════
  # Testes Frontend — Vitest
  # ═══════════════════════════════════════════════════════════
  test-frontend:
    name: Test Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  # ═══════════════════════════════════════════════════════════
  # Testes Rust — cargo check + clippy
  # ═══════════════════════════════════════════════════════════
  test-rust:
    name: Test Rust (cargo check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev

      - name: Check Rust code
        working-directory: src-tauri
        run: cargo check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -W warnings

  # ═══════════════════════════════════════════════════════════
  # QA Real — integração backend + comunicação + E2E web
  # ═══════════════════════════════════════════════════════════
  qa-real:
    name: QA Real (E2E + Integrations)
    runs-on: ubuntu-latest
    needs: [lint, test-frontend, test-rust]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_autoos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_autoos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run real QA journey
        run: npm run e2e:real

  # ═══════════════════════════════════════════════════════════
  # Build Tauri (apenas em push para main)
  # ═══════════════════════════════════════════════════════════
  build-tauri:
    name: Build Tauri App
    needs: [lint, test-frontend, test-rust, qa-real]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoos-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/*.exe
          retention-days: 7
